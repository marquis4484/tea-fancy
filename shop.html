<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>(Shop) Tea Fancy</title>
      <link rel="shortcut icon" href="./images/TFLogo2.png" />
    <!-- font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
    />
 <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
     <link
      href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&family=Mea+Culpa&family=Monsieur+La+Doulaise&display=swap"
      rel="stylesheet"
    />

    <!-- styles css -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-left">
        <!-- sidebar + logo -->
        <button class="toggle-nav">
          <i class="fas fa-bars"></i>
        </button>

        <div class="logo">
          <ul>
            <li>
              <a href="index.html" class="company-name">Tea Fancy</a>

              <img src="./images/TFLogo2.png" class="tea-pic" alt="logo" />
            </li>
          </ul>
        </div>
      </div>

      <div class="nav-right">
        <!-- links + cart icon -->
        <ul class="nav-links">
          <li>
            <a href="aboutus.html" class="nav-link">About Us</a>
          </li>

          <li>
            <a href="locations.html" class="nav-link">Locations</a>
          </li>

          <li>
            <a href="contacts.html" class="nav-link">Contacts</a>
          </li>

          <li class="shop-now">
            <a href="shop.html" class="nav-link">Shop Now</a>
          </li>
        </ul>

        <div class="toggle-container">
          <button class="toggle-cart">
            <i class="fas fa-shopping-cart"></i>
          </button>

          <span class="cart-item-count">1</span>
        </div>
      </div>
    </nav>

  <!-- sidebar -->
    <div class="sidebar-overlay">
      <aside class="sidebar">
        <!-- close -->
        <button class="sidebar-close">
          <i class="fas fa-times"></i>
        </button>
        <!--sidebar links -->
        <ul class="sidebar-links">
          <li>
            <a href="index.html" class="sidebar-link">
              <i class="fas fa-home fa-fw"></i>
              Home
            </a>
          </li>
          <li>
            <a href="aboutus.html" class="sidebar-link">
              <i class="fas fa-book fa-fw"></i>
              About Us
            </a>
          </li>
          <li>
            <a href="locations.html" class="sidebar-link">
              <i class="fas fa-map fa-fw"></i>
              Locations
            </a>
          </li>
              <li>
            <a href="contacts.html" class="sidebar-link">
              <i class="fas fa-phone fa-fw"></i>
              Contacts
            </a>
          </li>
          <li>
            <a href="shop.html" class="sidebar-link">
              <i class="fas fa-shopping-cart fa-fw"></i>
              Shop Now
            </a>
          </li>
        </ul>
      </aside>
    </div>
    <!-- cart -->
    <div class="cart-overlay">
      <aside class="cart">
        <button class="cart-close">
          <i class="fas fa-times"></i>
        </button>
        <header>
          <h3 class="text-slanted">your bag</h3>
        </header>
        <!-- cart items -->
        <div class="cart-items"></div>
        <!-- footer -->
        <footer>
          <h3 class="cart-total text-slanted">total : $12.99</h3>
          <button class="cart-checkout btn">checkout</button>
        </footer>
      </aside>
    </div>
    <div class="shop-page">
    <div class="shop-title">
      Order Here!
    </div>
    <!-- products -->
    <section class="shop">
      <!-- filters -->
      <div class="filters">
        <div class="filters-container">
          <!-- search -->
          <div class="filter-group">
            <form class="input-form">
              <input
                type="text"
                class="search-input"
                placeholder="search..."
              />
            </form>
          </div>
          <!-- categories -->
          <div class="filter-group">
            <h4>Tea Types</h4>
            <article class="companies">
              <button class="company-btn">all</button>
              <button class="company-btn">any</button>
            </article>
          </div>
          <!-- price -->
          <div class="filter-group">
            <h4>Price</h4>
            <form class="price-form">
              <input
                type="range"
                class="price-filter"
                min="0"
                value="50"
                max="100"
              />
            </form>
            <p class="price-value"></p>
          </div>
          <h3 class="filter-error" aria-live="polite"></h3>
        </div>
      </div>
      <!-- products -->
      <div class="products-container"></div>
    </section>
    </div>
     <footer class="footer_copyright">
      &copy; Tea Fancy, Inc. All rights reserved 20XX.
    </footer>
    <!-- page loading -->
    <div class="page-loading">
      <h2>Loading...</h2>
    </div>
    <script type="module" src="./src/pages/shop.js"></script>
  </body>
</html>
